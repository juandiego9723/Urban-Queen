<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Modo Batalla Urban Queens</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap"
              rel="stylesheet">
        <style>
        body { font-family: 'Bangers', cursive; text-align: center; overflow: hidden; background: #00FF00; color: white; margin: 0; padding: 20px; letter-spacing: 2px;}
        .batalla-container { background: #111; border: 4px solid #222; border-radius: 20px; padding: 20px; width: 90%; margin: auto; box-shadow: 0 0 20px rgba(0,0,0,0.8); position: relative;}
        .timer { font-size: 60px; color: #FFD700; text-shadow: 3px 3px 6px #000; margin-bottom: 10px; transition: color 0.3s, transform 0.3s; }
        .bar-container { display: flex; width: 100%; height: 50px; background: #222; border-radius: 25px; overflow: hidden; box-shadow: inset 0 0 10px #000; margin-bottom: 15px; }
        .bar { height: 100%; transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 5px #000; }
        .info-container { display: flex; justify-content: space-around; font-size: 35px; text-shadow: 3px 3px 6px #000; }
        .chica-info { display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .coronas { font-size: 25px; color: #ccc; margin-top: -10px;}
        .oculto { display: none !important; }
        #anuncio-fin { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; text-shadow: 5px 5px 10px #000; z-index: 1000; white-space: nowrap; background: rgba(0,0,0,0.9); padding: 20px 40px; border-radius: 15px; border: 4px solid #FFD700;}
        </style>
    </head>
    <body>
        <div class="batalla-container" id="caja-batalla">
            <div class="timer" id="timer">ESPERANDO BATALLA...</div>
            <div class="bar-container" id="bar-container"></div>
            <div class="info-container" id="info-container"></div>
            <div id="anuncio-fin"></div>
        </div>
        <script src="/socket.io/socket.io.js"></script>
        <script>
        const socket = io();
        let participantesActivos = [];
        let TODAS_LAS_CHICAS = [];
        let equiposInfo = {};
        let APODOS = {};
        const anuncio = document.getElementById('anuncio-fin');
        const timerEl = document.getElementById('timer');

        function lightenColor(hex) {
            try {
                let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
                r = Math.min(255, r + 60); g = Math.min(255, g + 60); b = Math.min(255, b + 60);
                return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
            } catch(e) { return hex; }
        }

        function renderParticipantes(participantes, equipos, victorias, puntos) {
            TODAS_LAS_CHICAS = Object.keys(equipos);
            participantesActivos = participantes;
            equiposInfo = equipos;

            const barContainer = document.getElementById('bar-container');
            const infoContainer = document.getElementById('info-container');
            barContainer.innerHTML = '';
            infoContainer.innerHTML = '';

            const pct = 100 / participantes.length;
            TODAS_LAS_CHICAS.forEach(chica => {
                const eq = equipos[chica] || { nombre: chica.toUpperCase(), color: '#ffffff' };
                const light = lightenColor(eq.color);
                const enBatalla = participantes.includes(chica);

                const bar = document.createElement('div');
                bar.id = 'bar-' + chica;
                bar.className = 'bar' + (enBatalla ? '' : ' oculto');
                bar.style.background = `linear-gradient(90deg, ${eq.color}, ${light})`;
                bar.style.width = (enBatalla ? pct : 0) + '%';
                bar.innerText = puntos[chica] || 0;
                barContainer.appendChild(bar);

                const info = document.createElement('div');
                info.id = 'info-' + chica;
                info.className = 'chica-info' + (enBatalla ? '' : ' oculto');
                info.style.width = (100 / TODAS_LAS_CHICAS.length) + '%';
                info.innerHTML = `<span style="color:${eq.color}">${eq.nombre}</span><span class="coronas" id="vic-${chica}">👑 X${victorias[chica] || 0}</span>`;
                infoContainer.appendChild(info);
            });
        }

        socket.on('batallaInicio', (data) => {
            anuncio.style.display = 'none';
            timerEl.style.transform = 'scale(1)';
            timerEl.style.color = '#FFD700';
            renderParticipantes(data.participantes, data.equipos || equiposInfo, data.victorias || {}, data.puntos || {});
        });

        socket.on('batallaTick', (tiempo) => {
            let m = Math.floor(tiempo / 60).toString().padStart(2, '0');
            let s = (tiempo % 60).toString().padStart(2, '0');
            timerEl.innerText = m + ':' + s;
        });

        socket.on('batallaPuntos', actualizarBarras);

        socket.on('batallaFin', (data) => {
            const esEmpate = (data.ganadora === 'EMPATE' || data.ganadora === 'SIN PUNTOS');
            const nombreDisplay = esEmpate ? data.ganadora : (APODOS[data.ganadora] || data.ganadora);
            let textoGanador = esEmpate ? nombreDisplay : '¡GANÓ ' + nombreDisplay + '!';
            timerEl.innerText = textoGanador;
            timerEl.style.transform = 'scale(1.2)';
            timerEl.style.color = esEmpate ? 'white' : 'gold';
            anuncio.style.color = esEmpate ? 'white' : '#FFD700';
            anuncio.style.borderColor = esEmpate ? 'white' : '#FFD700';
            anuncio.innerText = textoGanador;
            anuncio.style.display = 'block';
            if (!esEmpate && data.victorias) {
                const vicEl = document.getElementById('vic-' + data.ganadora);
                if (vicEl) vicEl.innerText = '👑 X' + data.victorias[data.ganadora];
            }
            setTimeout(() => { anuncio.style.display = 'none'; }, 5000);
        });

        socket.on('batallaCancelada', () => { 
            timerEl.innerText = "ESPERANDO BATALLA..."; 
            timerEl.style.transform = 'scale(1)';
            timerEl.style.color = '#FFD700';
            anuncio.style.display = 'none';
        });

        socket.on('queensActualizadas', (data) => {
            equiposInfo = data.equipos;
            if (data.apodos) APODOS = data.apodos;
        });

        function actualizarBarras(puntos) {
            let total = 0;
            participantesActivos.forEach(c => { total += (puntos[c] || 0); });
            const pct = 100 / participantesActivos.length;
            participantesActivos.forEach(chica => {
                const barEl = document.getElementById('bar-' + chica);
                if (barEl) {
                    let p = (total === 0) ? pct : ((puntos[chica] || 0) / total) * 100;
                    barEl.style.width = p + '%';
                    barEl.innerText = puntos[chica] || 0;
                }
            });
        }

        // Cargar info inicial de equipos y apodos
        fetch('/api/queens/all').then(r => r.json()).then(all => {
            all.forEach(q => {
                if (q.activo) {
                    const display = (q.apodo && q.apodo.trim()) ? q.apodo.trim() : q.name;
                    equiposInfo[q.name] = { nombre: display.toUpperCase(), color: q.color };
                }
            });
        });
        fetch('/api/apodos').then(r => r.json()).then(map => { APODOS = map; });
        </script>
    </body>
</html>
